name: Jobs CI

# apps/jobs への push / PR で smoke test (純粋関数のみ) を回す軽量 CI。

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/jobs/**"
      - "apps/api/**"
      - ".github/workflows/jobs-ci.yml"
  pull_request:
    paths:
      - "apps/jobs/**"
      - "apps/api/**"
      - ".github/workflows/jobs-ci.yml"

concurrency:
  group: jobs-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (apps/jobs)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: apps/jobs

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # sync_catalog が apps/api のモデルを import するため、両方インストール
          # api は [dev] extras で pytest / httpx も同梱
          pip install -e "../api[dev]"
          pip install -e .

      - name: Run pytest
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
        run: |
          python -m pytest -v
