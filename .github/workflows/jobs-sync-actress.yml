# ============================================================================
# .github/workflows/jobs-sync-actress.yml
# ----------------------------------------------------------------------------
# Xserver VPS 上で sync_actress_profiles (--only-missing) を 1 日 1 回実行する。
#
# 設計はjobs-sync-catalog.yml と同じハイブリッド構成:
#   GitHub Actions cron → SSH → VPS で docker compose run --rm jobs
#
# スケジュール:
#   - 13:00 JST = 04:00 UTC
#     (sync_catalog 08:00 / 14:00 の間でぶつからない時間帯を選択)
# ============================================================================
name: Jobs - sync_actress_profiles

on:
  schedule:
    - cron: "0 4 * * *"   # 13:00 JST
  workflow_dispatch:
    inputs:
      only_missing:
        description: "--only-missing を付けるか (false で全女優再取得、空なら env→true)"
        required: false
        default: "true"
      limit:
        description: "処理件数上限 (空なら env SYNC_ACTRESS_LIMIT → 無制限)"
        required: false
        default: ""

concurrency:
  group: jobs-sync-actress
  cancel-in-progress: false

jobs:
  sync-actress:
    name: sync_actress_profiles on Xserver VPS
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: production

    steps:
      - name: Set up SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.XSERVER_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.XSERVER_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          eval "$(ssh-agent -s)"
          printenv SSH_PRIVATE_KEY | ssh-add - >/dev/null
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Run sync_actress_profiles via SSH
        env:
          HOST: ${{ secrets.XSERVER_SSH_HOST }}
          USER: ${{ secrets.XSERVER_SSH_USER }}
          PORT: ${{ secrets.XSERVER_SSH_PORT }}
          REPO_DIR: ${{ secrets.XSERVER_REPO_DIR }}
          # workflow_dispatch 由来の値。only_missing は cron デフォルトとして
          # "true" を維持するため空でも "true" にフォールバックする。
          # limit が空のときは sync_actress_profiles 側で env SYNC_ACTRESS_LIMIT
          # → 無制限の順にフォールバックする。
          ONLY_MISSING: ${{ github.event.inputs.only_missing || 'true' }}
          LIMIT: ${{ github.event.inputs.limit || '' }}
        run: |
          set -euo pipefail
          : "${HOST:?XSERVER_SSH_HOST not set}"
          : "${USER:?XSERVER_SSH_USER not set}"
          : "${REPO_DIR:?XSERVER_REPO_DIR not set}"
          PORT_OPT=""
          if [ -n "${PORT}" ]; then
            PORT_OPT="-p ${PORT}"
          fi

          ONLY_MISSING_ARG=""
          if [ "${ONLY_MISSING}" = "true" ]; then
            ONLY_MISSING_ARG="--only-missing"
          fi
          # LIMIT は CLI 値があれば渡し、空なら env (SYNC_ACTRESS_LIMIT) に委譲。
          LIMIT_ARG=""
          if [ -n "${LIMIT}" ]; then
            LIMIT_ARG="--limit ${LIMIT}"
          fi

          # SYNC_ACTRESS_* は infra/xserver/.env から docker compose の
          # env_file 経由で jobs コンテナに渡り、CLI 未指定時のフォールバックとして
          # スクリプトに参照される。
          #
          # SSH keepalive と PYTHONUNBUFFERED の意図は jobs-sync-catalog.yml と同じ。
          # 女優プロフィール同期は 1 件ごとに DMM API を 1 リクエスト叩くため、
          # 1000 件級でも分単位の沈黙はなく出力は出続けるが、保険として一律に
          # keepalive を付けて NAT 切断を防ぐ。
          ssh ${PORT_OPT} \
            -o BatchMode=yes \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -o TCPKeepAlive=yes \
            "${USER}@${HOST}" bash -s <<EOF
          set -euo pipefail
          trap 'echo "[remote] exit_status=\$?" >&2' EXIT
          echo "[remote] start \$(date -u +%FT%TZ)"
          cd "${REPO_DIR}/infra/xserver"
          echo "[remote] docker compose build start \$(date -u +%FT%TZ)"
          docker compose --profile cli build jobs
          echo "[remote] docker compose build done \$(date -u +%FT%TZ)"
          echo "[remote] sync_actress_profiles run start \$(date -u +%FT%TZ)"
          docker compose --profile cli run --rm -T \
            -e PYTHONUNBUFFERED=1 \
            jobs \
            python -m src.sync_actress_profiles \
              ${ONLY_MISSING_ARG} \
              ${LIMIT_ARG}
          echo "[remote] sync_actress_profiles run done \$(date -u +%FT%TZ)"
          EOF

      - name: Tear down ssh-agent
        if: always()
        run: |
          if [ -n "${SSH_AGENT_PID:-}" ]; then
            kill "$SSH_AGENT_PID" 2>/dev/null || true
          fi
          rm -f ~/.ssh/known_hosts
