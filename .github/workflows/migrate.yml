name: DB Migrate

# 本番 DB に対する Alembic マイグレーションを実行するワークフロー。
#
# トリガー:
#   - main にマージされ、かつ alembic / モデル定義に変更があったとき
#   - 手動実行 (workflow_dispatch) も可
#
# 必要な Secrets:
#   - DATABASE_URL: 本番 Postgres への接続文字列 (postgresql://... 形式)
#                   Railway の場合は Variables の DATABASE_URL をコピー
#
# 将来 AWS (RDS) に移行した際もこのワークフローはそのまま再利用可能。
# Secrets を AWS の RDS エンドポイントに差し替えるだけでよい。

on:
  push:
    branches: [main]
    paths:
      - "apps/api/alembic/**"
      - "apps/api/app/db/**"
      - "apps/api/alembic.ini"
      - "apps/api/pyproject.toml"
      - ".github/workflows/migrate.yml"
  workflow_dispatch:

concurrency:
  # 同時に複数のマイグレーションが走らないようにする
  group: db-migrate-prod
  cancel-in-progress: false

jobs:
  migrate:
    name: alembic upgrade head
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Show current revision (before)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          alembic current || true

      - name: Run alembic upgrade head
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          alembic upgrade head

      - name: Show current revision (after)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          alembic current
