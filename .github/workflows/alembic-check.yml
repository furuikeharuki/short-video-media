name: Alembic Migration Check

# apps/api/alembic/versions/ のマイグレーションが
#   - upgrade head まで一直線に流せる
#   - autogenerate と乖離していない
# ことを CI でガードする。本番 Postgres と同じ 16-alpine を services で起動する。

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/api/alembic/**"
      - "apps/api/app/db/**"
      - "apps/api/pyproject.toml"
      - ".github/workflows/alembic-check.yml"
  pull_request:
    paths:
      - "apps/api/alembic/**"
      - "apps/api/app/db/**"
      - "apps/api/pyproject.toml"
      - ".github/workflows/alembic-check.yml"

concurrency:
  group: alembic-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  upgrade-head:
    name: alembic upgrade head (postgres:16)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: apps/api

    env:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
      PYTHONDONTWRITEBYTECODE: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Wait for postgres
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U test >/dev/null 2>&1; then
              echo "postgres ready"; exit 0
            fi
            echo "waiting for postgres ($i/30)"; sleep 1
          done
          echo "postgres did not become ready"; exit 1

      - name: alembic upgrade head
        run: alembic upgrade head

      - name: alembic current
        run: alembic current

      # autogenerate との差分が無いことを軽くチェックする。
      # 完全一致ではなく「空の差分が生成されない」ことを確認する程度。
      # PostgreSQL のデフォルトや既存 index 差分などで誤検出する可能性が
      # 高いため、失敗してもジョブ全体は通すが、PR の Summary でログを
      # 確認しやすいよう warning を出力する。
      - name: alembic check (autogen drift, advisory)
        id: drift
        continue-on-error: true
        run: |
          alembic check 2>&1 | tee alembic-check.log
          # alembic check は新規 revision 提案があれば非 0 で終了する
        # `alembic check` は 1.10+ で利用可能。pyproject では >=1.13 を要求しているため OK。

      - name: Warn if autogen drift detected
        if: steps.drift.outcome == 'failure'
        run: |
          echo "::warning::alembic check に差分が検出されました。models と DB schema が乖離している可能性があります。詳細は alembic-check.log を参照してください。"

      - name: Upload alembic check log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alembic-check-log
          path: apps/api/alembic-check.log
          if-no-files-found: ignore
          retention-days: 7
