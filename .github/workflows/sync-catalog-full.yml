name: Sync Catalog (Full / Bootstrap)

# DMM (FANZA) ItemList API から作品データを全件取得して本番 DB に保存するワークフロー。
# 期間スライス (gte_date/lte_date 月単位) で offset 上限 (50000) を回避する。
#
# トリガー:
#   - cron: 毎月 1 日 10:00 JST (= 月初の午前、トラフィックが少ない時間帯) に定期実行
#   - 手動実行 (workflow_dispatch) で start_date / end_date / floors を任意指定
#
# 仕様:
#   - --mode full でデフォルト start_date=2000-01-01, end_date=今日 (全期間)
#   - --refresh-sample-url が自動で有効になる (sample_movie_url を強制上書き)
#     これによりクライアント学習キャッシュは月 1 でリセットされ、URL ロジック
#     変更も翌月には自動追従する
#   - goods フロアは DB に既に存在する女優に関連する商品だけ保存される
#
# 必要な Secrets:
#   - DMM_API_ID              : DMM アフィリエイト管理画面で発行する API ID
#   - DMM_AFFILIATE_ID        : DMM API 呼び出し用 ID (末尾 -990〜-999 必須)
#   - DMM_LINK_AFFILIATE_ID   : 購入ページに付ける af_id (末尾 -001 などサイト紐付け用)
#   - DATABASE_URL            : 本番 Postgres への接続文字列 (Railway Public URL)

on:
  # ⚠️ 2026-05-19: Railway Postgres の Public Network egress が異常に大きくなり一時停止。
  # 詳細は sync-catalog.yml のコメント参照。手動実行は引き続き可能。
  # schedule:
  #   # 毎月 1 日 01:00 UTC = 毎月 1 日 10:00 JST
  #   # アダルトサイトは夜中にアクセスが集中するため、日中の低トラフィック帯に実行する
  #   - cron: "0 1 1 * *"
  workflow_dispatch:
    inputs:
      start_date:
        description: "取得開始日 (YYYY-MM-DD)"
        required: false
        default: "2000-01-01"
      end_date:
        description: "取得終了日 (YYYY-MM-DD、空なら今日)"
        required: false
        default: ""
      floors:
        description: "対象フロア (カンマ区切り、空なら videoa,videoc,goods)"
        required: false
        default: ""
      actress_profile_args:
        description: "sync_actress_profiles への追加引数 (例: --only-missing / --limit 100 / 空文字で全女優更新)"
        required: false
        default: "--only-missing"
      dry_run:
        description: "DB に書かずに動作確認だけ行う"
        required: false
        default: "false"

concurrency:
  # 通常の sync-catalog (毎時) と排他制御する必要はないが、
  # フル同期は重いので二重起動を必ず防ぐ
  group: sync-catalog-full-prod
  cancel-in-progress: false

jobs:
  sync-full:
    name: Sync DMM Catalog (Full) to DB
    runs-on: ubuntu-latest
    # GitHub Actions の最大 6 時間以内に収まる想定。期間スライスごとに数分。
    timeout-minutes: 350

    defaults:
      run:
        working-directory: apps/jobs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # apps/api のモデルを再利用するため、両方インストール
          pip install -e ../api
          pip install -e .

      - name: Run sync_catalog (full)
        env:
          DMM_API_ID: ${{ secrets.DMM_API_ID }}
          DMM_AFFILIATE_ID: ${{ secrets.DMM_AFFILIATE_ID }}
          DMM_LINK_AFFILIATE_ID: ${{ secrets.DMM_LINK_AFFILIATE_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          START_DATE_INPUT: ${{ github.event.inputs.start_date || '2000-01-01' }}
          END_DATE_INPUT: ${{ github.event.inputs.end_date || '' }}
          FLOORS_INPUT: ${{ github.event.inputs.floors || '' }}
          DRY_RUN_INPUT: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          ARGS="--mode full --start-date ${START_DATE_INPUT}"
          if [ -n "${END_DATE_INPUT}" ]; then
            ARGS="${ARGS} --end-date ${END_DATE_INPUT}"
          fi
          if [ -n "${FLOORS_INPUT}" ]; then
            ARGS="${ARGS} --floors ${FLOORS_INPUT}"
          fi
          if [ "${DRY_RUN_INPUT}" = "true" ]; then
            ARGS="${ARGS} --dry-run"
          fi
          echo "Running: python -m src.sync_catalog ${ARGS}"
          python -m src.sync_catalog ${ARGS}

      # sync_catalog で新規女優が追加される可能性があるため、その後で
      # ActressSearch API を使って DB の全女優のプロフィールを更新する。
      # 女優のプロフィールはほぼ静的 (生年月日や出身地) なので、3 ホップ目以降に
      # 定期実行するだけで十分。デフォルトでは --only-missing で未取得の女優に絞る。
      - name: Run sync_actress_profiles
        env:
          DMM_API_ID: ${{ secrets.DMM_API_ID }}
          DMM_AFFILIATE_ID: ${{ secrets.DMM_AFFILIATE_ID }}
          DMM_LINK_AFFILIATE_ID: ${{ secrets.DMM_LINK_AFFILIATE_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DRY_RUN_INPUT: ${{ github.event.inputs.dry_run || 'false' }}
          PROFILE_ARGS_INPUT: ${{ github.event.inputs.actress_profile_args || '--only-missing' }}
        run: |
          ARGS="${PROFILE_ARGS_INPUT}"
          if [ "${DRY_RUN_INPUT}" = "true" ]; then
            ARGS="${ARGS} --dry-run"
          fi
          echo "Running: python -m src.sync_actress_profiles ${ARGS}"
          python -m src.sync_actress_profiles ${ARGS}
