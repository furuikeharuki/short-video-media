name: Sync Catalog (DMM ItemList)

# DMM (FANZA) ItemList API から最新作品データを定期取得して本番 DB に保存するワークフロー。
# 全件取得 (ブートストラップ / 月 1) は sync-catalog-full.yml を使う。
#
# トリガー:
#   - cron: 日中のみ 2 時間ごと (JST 10/12/14/16/18 の 5 回)
#     深夜帯はサービスのピークタイムなので避ける。
#   - sync 完了後に同ジョブで resolve_sample_urls も連続実行し、
#     新着作品の sample_movie_url をその場で埋める。
#   - 手動実行 (workflow_dispatch) も可。--hits を指定して任意件数を取得できる。
#
# 必要な Secrets:
#   - DMM_API_ID              : DMM アフィリエイト管理画面で発行する API ID
#   - DMM_AFFILIATE_ID        : DMM API 呼び出し用 ID (末尾 -990〜-999 必須)
#   - DMM_LINK_AFFILIATE_ID   : 購入ページに付ける af_id (末尾 -001 などサイト紐付け用)
#                               未設定時は DMM_AFFILIATE_ID をフォールバックで使用
#   - DATABASE_URL            : 本番 Postgres への接続文字列 (Railway Public URL)
#   - RESOLVER_BASE_URL       : Xserver VPS resolver の URL (resolve ステップ用)
#   - RESOLVER_API_KEY        : resolver Bearer 認証用 API キー (resolve ステップ用)

on:
  schedule:
    # 日中のみ 2 時間ごと (JST 10/12/14/16/18 = UTC 01/03/05/07/09)
    # 深夜帯 (JST 0-9時) はサービスのピークタイムなので走らせない。
    - cron: "0 1,3,5,7,9 * * *"
  workflow_dispatch:
    inputs:
      hits:
        description: "1 フロアあたりの取得件数"
        required: false
        default: "100"
      floors:
        description: "対象フロア (カンマ区切り、例: videoa,videoc,goods)"
        required: false
        default: ""
      dry_run:
        description: "DB に書かずに動作確認だけ行う"
        required: false
        default: "false"
      gte_date:
        description: "取得対象の最小発売日 (YYYY-MM-DD、incremental モードのみ)"
        required: false
        default: ""
      lte_date:
        description: "取得対象の最大発売日 (YYYY-MM-DD、incremental モードのみ)"
        required: false
        default: ""

concurrency:
  group: sync-catalog-prod
  cancel-in-progress: false

jobs:
  sync:
    name: Sync DMM Catalog to DB
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: apps/jobs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # apps/api のモデルを再利用するため、両方インストール
          pip install -e ../api
          pip install -e .

      - name: Run sync_catalog
        env:
          DMM_API_ID: ${{ secrets.DMM_API_ID }}
          DMM_AFFILIATE_ID: ${{ secrets.DMM_AFFILIATE_ID }}
          DMM_LINK_AFFILIATE_ID: ${{ secrets.DMM_LINK_AFFILIATE_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          HITS: ${{ github.event.inputs.hits || '100' }}
          FLOORS_INPUT: ${{ github.event.inputs.floors || '' }}
          DRY_RUN_INPUT: ${{ github.event.inputs.dry_run || 'false' }}
          GTE_DATE_INPUT: ${{ github.event.inputs.gte_date || '' }}
          LTE_DATE_INPUT: ${{ github.event.inputs.lte_date || '' }}
        run: |
          ARGS="--hits ${HITS}"
          if [ -n "${FLOORS_INPUT}" ]; then
            ARGS="${ARGS} --floors ${FLOORS_INPUT}"
          fi
          if [ "${DRY_RUN_INPUT}" = "true" ]; then
            ARGS="${ARGS} --dry-run"
          fi
          if [ -n "${GTE_DATE_INPUT}" ]; then
            ARGS="${ARGS} --gte-date ${GTE_DATE_INPUT}"
          fi
          if [ -n "${LTE_DATE_INPUT}" ]; then
            ARGS="${ARGS} --lte-date ${LTE_DATE_INPUT}"
          fi
          echo "Running: python -m src.sync_catalog ${ARGS}"
          python -m src.sync_catalog ${ARGS}

      # sync で新規追加された作品は sample_movie_url=NULL で保存されるため、
      # その場で resolver を叩いて MP4 URL を埋める。静かに走らせたいので
      # 並列度は控えめ (4)、同ジョブ内なので dry-run トリガー時はスキップ。
      - name: Resolve new sample_movie_url
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESOLVER_BASE_URL: ${{ secrets.RESOLVER_BASE_URL }}
          RESOLVER_API_KEY: ${{ secrets.RESOLVER_API_KEY }}
        run: |
          # 取りこぼしがあるといけないので --limit なし (=全件を NULL から埋める)。
          # resolver に負荷をかけすぎないよう concurrency=4。
          echo "Running: python -m src.resolve_sample_urls --concurrency 4"
          python -m src.resolve_sample_urls --concurrency 4
