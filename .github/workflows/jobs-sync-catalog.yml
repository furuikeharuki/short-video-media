# ============================================================================
# .github/workflows/jobs-sync-catalog.yml
# ----------------------------------------------------------------------------
# Xserver VPS 上で sync_catalog (incremental) を 1 日 3 回実行する。
#
# 設計方針 (ハイブリッド構成):
#   - cron スケジューラ自体は GitHub Actions に置く (常駐ワーカー廃止)
#   - 実際のジョブ実行は VPS 上の docker compose run --rm jobs で行う
#       → DB へは VPS 内 docker network 経由 (ローカル socket 相当) で書ける
#       → 日本 IP から DMM API を叩ける
#       → Actions runner (US) からの大量 INSERT による遅延を避けられる
#
# 必要な GitHub Secrets (deploy-xserver.yml と共通のものを再利用):
#   XSERVER_SSH_HOST       : VPS の IP / ホスト名
#   XSERVER_SSH_USER       : SSH ユーザー (docker グループ所属)
#   XSERVER_SSH_PORT       : SSH ポート (任意, デフォルト 22)
#   XSERVER_SSH_KEY        : Ed25519 秘密鍵 (BEGIN OPENSSH PRIVATE KEY... 全文)
#   XSERVER_KNOWN_HOSTS    : ssh-keyscan の出力
#   XSERVER_REPO_DIR       : VPS 上のリポジトリパス (例: /opt/short-video-media)
#
# スケジュール:
#   - 08:00 JST = 23:00 UTC (前日)
#   - 14:00 JST = 05:00 UTC
#   - 20:00 JST = 11:00 UTC
#
# 手動実行: Actions → "Jobs: sync_catalog (incremental)" → Run workflow
# ============================================================================
name: Jobs - sync_catalog (incremental)

on:
  schedule:
    # cron は UTC 固定。JST に揃えるため UTC へ変換した値を入れる。
    - cron: "0 23 * * *"  # 08:00 JST (前日 23:00 UTC)
    - cron: "0 5 * * *"   # 14:00 JST
    - cron: "0 11 * * *"  # 20:00 JST
  workflow_dispatch:
    inputs:
      hits:
        description: "1 フロアあたり取得件数 (空なら env SYNC_CATALOG_HITS → 100)"
        required: false
        default: ""
      floors:
        description: "対象フロア (カンマ区切り, 空なら env SYNC_CATALOG_FLOORS → 既定)"
        required: false
        default: ""

# 同じジョブが重ならないようにする (前回 sync が長引いた時の二重起動防止)。
# cancel-in-progress=false にしておくのは、進行中の sync を kill すると中途半端に
# なるため。
concurrency:
  group: jobs-sync-catalog
  cancel-in-progress: false

jobs:
  sync-catalog:
    name: sync_catalog on Xserver VPS
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production

    steps:
      - name: Set up SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.XSERVER_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.XSERVER_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          eval "$(ssh-agent -s)"
          printenv SSH_PRIVATE_KEY | ssh-add - >/dev/null
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Run sync_catalog via SSH
        env:
          HOST: ${{ secrets.XSERVER_SSH_HOST }}
          USER: ${{ secrets.XSERVER_SSH_USER }}
          PORT: ${{ secrets.XSERVER_SSH_PORT }}
          REPO_DIR: ${{ secrets.XSERVER_REPO_DIR }}
          # workflow_dispatch 由来の値。空ならスクリプト側で
          # VPS 上 .env / docker compose 環境変数 (SYNC_CATALOG_*) → ハードコード
          # default の順にフォールバックする。
          # mode は cron では常に incremental (最新追跡) を使うため env / dispatch
          # からは設定不可。--mode full は手動 CLI でのみ使う。
          HITS: ${{ github.event.inputs.hits || '' }}
          FLOORS: ${{ github.event.inputs.floors || '' }}
        run: |
          set -euo pipefail
          : "${HOST:?XSERVER_SSH_HOST not set}"
          : "${USER:?XSERVER_SSH_USER not set}"
          : "${REPO_DIR:?XSERVER_REPO_DIR not set}"
          PORT_OPT=""
          if [ -n "${PORT}" ]; then
            PORT_OPT="-p ${PORT}"
          fi

          # CLI フラグは値が指定された時だけ付ける。
          # 空のときは sync_catalog 側が env (SYNC_CATALOG_*) を見にいく。
          HITS_ARG=""
          if [ -n "${HITS}" ]; then
            HITS_ARG="--hits ${HITS}"
          fi
          FLOORS_ARG=""
          if [ -n "${FLOORS}" ]; then
            FLOORS_ARG="--floors ${FLOORS}"
          fi

          # VPS 上で docker compose run --rm jobs を叩く。
          # jobs サービスは profiles: ["cli"] なので "docker compose up" には含まれず、
          # ここで明示的に呼ぶことでだけ起動する。完了後はそのまま破棄される (--rm)。
          # SYNC_CATALOG_* は infra/xserver/.env から docker compose の
          # env_file 経由で jobs コンテナに渡り、CLI 未指定時のフォールバックとして
          # スクリプトに参照される。
          # --mode incremental を明示することで、env で偶発的に full モードに
          # 切り替わるリスクを workflow レベルで排除する。
          #
          # SSH keepalive (ServerAliveInterval=30 / CountMax=10 / TCPKeepAlive=yes) を
          # 付与し、GitHub Actions runner 側 NAT / VPS 側 firewall が長い無出力期間
          # (caches warm + DMM API rate limit 待ち) で TCP セッションを切るのを防ぐ。
          # PYTHONUNBUFFERED=1 でコンテナ内 Python の stdout を即座に flush し、
          # cron 失敗時の調査がしやすいようログをリアルタイムで流す。
          ssh ${PORT_OPT} \
            -o BatchMode=yes \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -o TCPKeepAlive=yes \
            "${USER}@${HOST}" bash -s <<EOF
          set -euo pipefail
          trap 'echo "[remote] exit_status=\$?" >&2' EXIT
          echo "[remote] start \$(date -u +%FT%TZ)"
          cd "${REPO_DIR}/infra/xserver"
          # 既存 build を流用するが、image が古ければ再 build される。
          # build しか走らない時でも数十秒で済むので毎回付けておく。
          echo "[remote] docker compose build start \$(date -u +%FT%TZ)"
          docker compose --profile cli build jobs
          echo "[remote] docker compose build done \$(date -u +%FT%TZ)"
          echo "[remote] sync_catalog run start \$(date -u +%FT%TZ)"
          # -T で TTY 無効化 / -e PYTHONUNBUFFERED=1 で Python stdout を即時 flush。
          docker compose --profile cli run --rm -T \
            -e PYTHONUNBUFFERED=1 \
            jobs \
            python -m src.sync_catalog \
              --mode incremental \
              ${HITS_ARG} \
              ${FLOORS_ARG}
          echo "[remote] sync_catalog run done \$(date -u +%FT%TZ)"
          EOF

      - name: Tear down ssh-agent
        if: always()
        run: |
          if [ -n "${SSH_AGENT_PID:-}" ]; then
            kill "$SSH_AGENT_PID" 2>/dev/null || true
          fi
          rm -f ~/.ssh/known_hosts
