# ============================================================================
# .github/workflows/jobs-sync-video-urls.yml
# ----------------------------------------------------------------------------
# Xserver VPS 上で sync_video_urls を「月 1 回」実行し、サンプル動画 MP4 URL
# (低画質 / 高画質) を DB に貼り直す。
#
# 設計は jobs-sync-catalog.yml / jobs-sync-actress.yml と同じハイブリッド構成:
#   GitHub Actions cron → SSH → VPS で docker compose run --rm jobs
#
# なぜ月 1:
#   DMM のサンプル動画 URL は署名付き (トークン ~32 日有効)。月 1 で貼り直せば
#   期限切れは実質起きない。抽出は DMM への外部アクセスなので高頻度で回さない。
#
# なぜ既定 --force:
#   月次実行の主目的は「トークンが切れる前に全作品の URL を貼り直す」こと。
#   差分 (--only-missing) だと既存 URL が古いまま残るため、cron 既定は
#   全件フルリフレッシュ (--force) にする。URL 未保存だけを埋めたいときは
#   workflow_dispatch で force=false を指定する。
#
# なぜシャード分割 (shard):
#   全件フルリフレッシュは数万件を DMM へ 1 件ずつ抽出するため数時間かかり、
#   GitHub Actions のジョブ単位タイムアウト (ホストランナーは最大 6h) に張り付く。
#   実際 5 万件の実行が 4h で "The operation was canceled" になった。
#   そこで対象を N 分割 (shard) し、各シャードを別ジョブ (= 別タイムアウト予算) に
#   割り当てて順番に流す。1 ジョブあたりの実行時間を 1/N に抑えられ、合計では
#   N×6h ぶんの実行余地を確保できる。
#   分割は movie_id の安定ハッシュで行うため、直列実行中に前のシャードが DB を
#   更新しても後続シャードの担当範囲がずれない。
#   ※ sync_video_urls は advisory lock で同時 1 本しか走れない。シャードを並列に
#     すると 2 本目以降が "another instance is running; skip" で空振りするため、
#     max-parallel は必ず 1 (直列) にする。
#
# 必要な GitHub Secrets は jobs-sync-catalog.yml と共通。
#
# スケジュール:
#   - 毎月 1 日 18:00 UTC = 毎月 2 日 03:00 JST
#     (sync_catalog 08:00/14:00/20:00 JST・actress 13:00 JST とぶつからない時間帯)
#
# 手動実行: Actions → "Jobs: sync_video_urls (monthly)" → Run workflow
# ============================================================================
name: Jobs - sync_video_urls (monthly)

on:
  schedule:
    - cron: "0 18 1 * *"  # 毎月 1 日 18:00 UTC = 毎月 2 日 03:00 JST
  workflow_dispatch:
    inputs:
      force:
        description: "全作品を再抽出して貼り直すか (false で URL 未保存のみ埋める)"
        required: false
        default: "true"
      limit:
        description: "処理件数上限 (空なら env SYNC_VIDEO_URLS_LIMIT → 無制限)"
        required: false
        default: ""
      concurrency:
        description: "同時抽出数 (空なら env SYNC_VIDEO_URLS_CONCURRENCY → 3)"
        required: false
        default: ""
      shard_count:
        description: "対象を何分割して直列実行するか (既定 4; 1 で分割なし)"
        required: false
        default: "4"
      shard_index:
        description: "特定シャードだけ再実行する番号 (空なら 0..shard_count-1 を全部実行)"
        required: false
        default: ""

# 同じ「実行 (run)」が重ならないようにする (前回実行が長引いた時の二重起動防止)。
# ※ これは run 単位の制御。1 run 内のシャード matrix ジョブは別枠で直列に流れる。
concurrency:
  group: jobs-sync-video-urls
  cancel-in-progress: false

jobs:
  # --------------------------------------------------------------------------
  # 何シャードに分割するかを決めて matrix 用の JSON 配列 (例: [0,1,2,3]) を出力する。
  # workflow_dispatch の shard_count 入力、cron では既定 4。
  # shard_index が指定された場合は、その 1 シャードだけを再実行できる。
  # --------------------------------------------------------------------------
  plan-shards:
    name: plan shards
    runs-on: ubuntu-latest
    outputs:
      shards: ${{ steps.compute.outputs.shards }}
      shard_count: ${{ steps.compute.outputs.shard_count }}
    steps:
      - id: compute
        env:
          SHARD_COUNT_INPUT: ${{ github.event.inputs.shard_count || '4' }}
          SHARD_INDEX_INPUT: ${{ github.event.inputs.shard_index || '' }}
        run: |
          set -euo pipefail
          n="${SHARD_COUNT_INPUT}"
          if ! printf '%s' "$n" | grep -Eq '^[0-9]+$' || [ "$n" -lt 1 ]; then
            echo "shard_count は 1 以上の整数で指定してください (got '$n')" >&2
            exit 1
          fi
          n=$((10#$n))
          if [ -n "${SHARD_INDEX_INPUT}" ]; then
            if ! printf '%s' "$SHARD_INDEX_INPUT" | grep -Eq '^[0-9]+$'; then
              echo "shard_index は 0..$((n - 1)) の整数で指定してください (got '$SHARD_INDEX_INPUT')" >&2
              exit 1
            fi
            shard_index=$((10#$SHARD_INDEX_INPUT))
            if [ "$shard_index" -ge "$n" ]; then
              echo "shard_index は 0..$((n - 1)) の整数で指定してください (got '$SHARD_INDEX_INPUT')" >&2
              exit 1
            fi
            shards="${shard_index}"
          else
            shards="$(seq 0 $((n - 1)) | paste -sd, -)"
          fi
          echo "shards=[${shards}]" >> "$GITHUB_OUTPUT"
          echo "shard_count=${n}" >> "$GITHUB_OUTPUT"
          echo "planned ${n} shard(s): [${shards}]"

  sync-video-urls:
    name: sync_video_urls shard ${{ matrix.shard }} on Xserver VPS
    needs: plan-shards
    runs-on: ubuntu-latest
    # シャードごとに別ジョブ = 別タイムアウト予算。1 シャードは全体の 1/N なので
    # ホストランナー上限 (6h=360min) に十分収まる。念のため上限手前まで許容する。
    timeout-minutes: 350
    environment: production
    strategy:
      # advisory lock があるためシャードは必ず直列 (並列だと 2 本目以降が空振り)。
      max-parallel: 1
      # 1 シャードが失敗しても残りのシャードは貼り直しを続けたい。
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(needs.plan-shards.outputs.shards) }}

    steps:
      - name: Set up SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.XSERVER_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.XSERVER_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          eval "$(ssh-agent -s)"
          printenv SSH_PRIVATE_KEY | ssh-add - >/dev/null
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Run sync_video_urls via SSH
        env:
          HOST: ${{ secrets.XSERVER_SSH_HOST }}
          USER: ${{ secrets.XSERVER_SSH_USER }}
          PORT: ${{ secrets.XSERVER_SSH_PORT }}
          REPO_DIR: ${{ secrets.XSERVER_REPO_DIR }}
          # workflow_dispatch 由来の値。cron ではデフォルト全件貼り直しにしたいので
          # force は空なら "true" にフォールバックする。limit / concurrency が空の
          # ときは sync_video_urls 側で env → 既定値の順にフォールバックする。
          FORCE: ${{ github.event.inputs.force || 'true' }}
          LIMIT: ${{ github.event.inputs.limit || '' }}
          CONCURRENCY: ${{ github.event.inputs.concurrency || '' }}
          # このジョブが担当するシャード。SHARD_COUNT は全体の分割数、SHARD_INDEX は
          # このジョブが処理する 0 始まりの番号。plan-shards の出力と matrix から渡す。
          SHARD_COUNT: ${{ needs.plan-shards.outputs.shard_count }}
          SHARD_INDEX: ${{ matrix.shard }}
        run: |
          set -euo pipefail
          : "${HOST:?XSERVER_SSH_HOST not set}"
          : "${USER:?XSERVER_SSH_USER not set}"
          : "${REPO_DIR:?XSERVER_REPO_DIR not set}"
          PORT_OPT=""
          if [ -n "${PORT}" ]; then
            PORT_OPT="-p ${PORT}"
          fi

          # force=true なら --force、false なら --no-only-missing は付けず
          # (URL 未保存のみを埋める既定 --only-missing 挙動に委ねる)。
          FORCE_ARG=""
          if [ "${FORCE}" = "true" ]; then
            FORCE_ARG="--force"
          fi
          LIMIT_ARG=""
          if [ -n "${LIMIT}" ]; then
            LIMIT_ARG="--limit ${LIMIT}"
          fi
          CONCURRENCY_ARG=""
          if [ -n "${CONCURRENCY}" ]; then
            CONCURRENCY_ARG="--concurrency ${CONCURRENCY}"
          fi
          # シャード指定。SHARD_COUNT<=1 のときは分割なし (--shard-* を付けない)。
          SHARD_ARG=""
          if [ -n "${SHARD_COUNT}" ] && [ "${SHARD_COUNT}" -gt 1 ]; then
            SHARD_ARG="--shard-count ${SHARD_COUNT} --shard-index ${SHARD_INDEX}"
          fi

          # SYNC_VIDEO_URLS_* は infra/xserver/.env から docker compose の
          # env_file 経由で jobs コンテナに渡り、CLI 未指定時のフォールバックとして
          # スクリプトに参照される。
          #
          # 抽出は DMM へ 1 件ずつアクセスするため、全件フルリフレッシュは分〜十数分
          # 級になりうる。SSH keepalive と PYTHONUNBUFFERED は他ジョブと同じ意図。
          ssh ${PORT_OPT} \
            -o BatchMode=yes \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -o TCPKeepAlive=yes \
            "${USER}@${HOST}" bash -s <<EOF
          set -euo pipefail
          trap 'echo "[remote] exit_status=\$?" >&2' EXIT
          echo "[remote] start \$(date -u +%FT%TZ) shard=${SHARD_INDEX}/${SHARD_COUNT}"
          cd "${REPO_DIR}/infra/xserver"
          echo "[remote] docker compose build start \$(date -u +%FT%TZ)"
          docker compose --profile cli build jobs
          echo "[remote] docker compose build done \$(date -u +%FT%TZ)"
          echo "[remote] sync_video_urls run start \$(date -u +%FT%TZ)"
          docker compose --profile cli run --rm -T \
            -e PYTHONUNBUFFERED=1 \
            jobs \
            python -m src.sync_video_urls \
              ${FORCE_ARG} \
              ${LIMIT_ARG} \
              ${CONCURRENCY_ARG} \
              ${SHARD_ARG}
          echo "[remote] sync_video_urls run done \$(date -u +%FT%TZ)"
          EOF

      - name: Tear down ssh-agent
        if: always()
        run: |
          if [ -n "${SSH_AGENT_PID:-}" ]; then
            kill "$SSH_AGENT_PID" 2>/dev/null || true
          fi
          rm -f ~/.ssh/known_hosts
