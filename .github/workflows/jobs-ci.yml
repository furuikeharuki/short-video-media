name: Jobs CI

# apps/jobs への push / PR で smoke test (純粋関数のみ) を回す軽量 CI。

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/jobs/**"
      - "apps/api/**"
      - ".github/workflows/jobs-ci.yml"
  pull_request:
    paths:
      - "apps/jobs/**"
      - "apps/api/**"
      - ".github/workflows/jobs-ci.yml"

concurrency:
  group: jobs-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (apps/jobs)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: apps/jobs

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
      PYTHONDONTWRITEBYTECODE: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            apps/api/pyproject.toml
            apps/jobs/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # sync_catalog が apps/api のモデルを import するため、両方インストール
          # api は [dev] extras で pytest / httpx も同梱
          pip install -e "../api[dev]"
          pip install -e .

      - name: Check Python syntax (compileall)
        run: |
          python -m compileall -q src tests

      - name: Run pytest
        run: |
          python -m pytest -v --junitxml=pytest-jobs.xml

      - name: Upload pytest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-jobs
          path: apps/jobs/pytest-jobs.xml
          if-no-files-found: ignore
          retention-days: 7
