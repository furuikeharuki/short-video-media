name: Debug DMM Image URLs

# DMM API から videoc の imageURL を直接吐き出して、画像 CDN の正しいパスを調査するための workflow。
# 結果は GitHub Actions の標準出力で確認できる。
#
# 一時的なデバッグ用なので、調査完了後は削除する。

on:
  workflow_dispatch:
    inputs:
      floor:
        description: "対象フロア"
        required: false
        default: "videoc"
      hits:
        description: "取得件数"
        required: false
        default: "5"

jobs:
  debug:
    name: Debug DMM Image URLs
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Fetch and dump
        env:
          DMM_API_ID: ${{ secrets.DMM_API_ID }}
          DMM_AFFILIATE_ID: ${{ secrets.DMM_AFFILIATE_ID }}
          FLOOR: ${{ github.event.inputs.floor || 'videoc' }}
          HITS: ${{ github.event.inputs.hits || '5' }}
        run: |
          python <<'PY'
          import os, json, urllib.request, urllib.parse

          params = {
              "api_id": os.environ["DMM_API_ID"],
              "affiliate_id": os.environ["DMM_AFFILIATE_ID"],
              "site": "FANZA",
              "service": "digital",
              "floor": os.environ["FLOOR"],
              "hits": os.environ["HITS"],
              "sort": "date",
              "output": "json",
          }
          url = "https://api.dmm.com/affiliate/v3/ItemList?" + urllib.parse.urlencode(params)
          with urllib.request.urlopen(url) as resp:
              data = json.loads(resp.read())

          items = data.get("result", {}).get("items", [])
          print(f"=== {os.environ['FLOOR']}: {len(items)} 件 ===")
          for item in items:
              cid = item.get("content_id")
              img = item.get("imageURL") or {}
              sample = item.get("sampleImageURL") or {}
              print(f"\n--- {cid} ---")
              print(f"  imageURL.list  = {img.get('list')}")
              print(f"  imageURL.small = {img.get('small')}")
              print(f"  imageURL.large = {img.get('large')}")
              print(f"  URL           = {item.get('URL')}")
              # サンプル画像の最初の 1 つも見る
              s_l = sample.get("sample_l", {}) or {}
              if isinstance(s_l, dict):
                  imgs = s_l.get("image", []) or []
                  if imgs:
                      print(f"  sample_l[0]    = {imgs[0]}")
          PY
