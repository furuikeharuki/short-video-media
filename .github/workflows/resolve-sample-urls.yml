name: Resolve Sample URLs (manual backfill)

# DB の sample_movie_url を Xserver VPS resolver で並列にバックフィルするワークフロー。
#
# 定期実行は sync-catalog.yml に統合済み (sync 直後に同ジョブで resolve も実行)。
# このワークフローは手動バックフィル専用 — 取りこぼしの再計算や、
# resolver / DB を直接修復したいときの緊急避難用に残してある。
#
# トリガー:
#   - workflow_dispatch: 手動実行のみ
#
# 必要な Secrets:
#   - DATABASE_URL         : 本番 Postgres への接続文字列
#   - RESOLVER_BASE_URL    : Xserver VPS resolver の URL (e.g. http://162.43.24.128)
#   - RESOLVER_API_KEY     : resolver Bearer 認証用 API キー

on:
  workflow_dispatch:
    inputs:
      concurrency:
        description: "並列度 (VPS resolver の RESOLVER_CONCURRENCY=8 に合わせる)"
        required: false
        default: "4"
      limit:
        description: "対象件数の上限 (空 = 全件、テスト時に小さい値を指定)"
        required: false
        default: ""
      dry_run:
        description: "DB に書かずログ出力だけ"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: resolve-sample-urls-prod
  cancel-in-progress: false

jobs:
  resolve:
    name: Backfill sample_movie_url via resolver
    runs-on: ubuntu-latest
    timeout-minutes: 60

    defaults:
      run:
        working-directory: apps/jobs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ../api
          pip install -e .

      - name: Run resolve_sample_urls
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESOLVER_BASE_URL: ${{ secrets.RESOLVER_BASE_URL }}
          RESOLVER_API_KEY: ${{ secrets.RESOLVER_API_KEY }}
          CONCURRENCY: ${{ github.event.inputs.concurrency || '4' }}
          LIMIT_INPUT: ${{ github.event.inputs.limit || '' }}
          DRY_RUN_INPUT: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          ARGS="--concurrency ${CONCURRENCY}"
          if [ -n "${LIMIT_INPUT}" ]; then
            ARGS="${ARGS} --limit ${LIMIT_INPUT}"
          fi
          if [ "${DRY_RUN_INPUT}" = "true" ]; then
            ARGS="${ARGS} --dry-run"
          fi
          echo "Running: python -m src.resolve_sample_urls ${ARGS}"
          python -m src.resolve_sample_urls ${ARGS}
