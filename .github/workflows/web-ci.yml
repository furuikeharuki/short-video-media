name: Web CI

# apps/web の TypeScript 型チェック + Next.js build を回す軽量 CI。
# ルート package.json に workspaces: ["apps/*"] が定義されているため、
# lockfile はルートにただ 1 つだけ存在する。インストールもルートで行う。

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/web/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/web-ci.yml"
  pull_request:
    paths:
      - "apps/web/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/web-ci.yml"

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: typecheck + build (apps/web)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # build が production 判定にならないように development を明示する。
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies (npm workspaces)
        run: npm ci

      # Next.js は .next/cache に Webpack / SWC のキャッシュを残す。
      # PR ブランチ間でも再利用できると build が数十秒〜数分短縮される。
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('apps/web/**/*.ts','apps/web/**/*.tsx','apps/web/**/*.js','apps/web/**/*.jsx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - name: TypeScript typecheck
        run: npm run typecheck -w apps/web

      - name: Next.js build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://example.com
          NEXT_PUBLIC_SITE_URL: https://example.com
          AUTH_SECRET: ci-only-32-byte-dummy-secret-not-used-anywhere
        run: npm run build -w apps/web
