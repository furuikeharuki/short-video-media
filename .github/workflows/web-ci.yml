name: Web CI

# apps/web の TypeScript 型チェック + Next.js build を回す軽量 CI。

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/web/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/web-ci.yml"
  pull_request:
    paths:
      - "apps/web/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/web-ci.yml"

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: typecheck + build (apps/web)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # ルート package.json に workspaces: ["apps/*"] が定義されているため、
    # lockfile はルートにただ 1 つだけ存在する。インストールもルートで行う。
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies (npm workspaces)
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck -w apps/web

      - name: Next.js build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://example.com
          NEXT_PUBLIC_SITE_URL: https://example.com
          AUTH_SECRET: ci-only-32-byte-dummy-secret-not-used-anywhere
        run: npm run build -w apps/web
