name: Sync Catalog (Year Matrix Bootstrap)

# 2000〜2026 (27 年分) を年単位で matrix 並列実行し、videoa + videoc 全件を取得する
# ブートストラップ専用ワークフロー。各ジョブは sync_catalog --mode full で月スライス
# (12 ヶ月) を内部展開する。
#
# 既存ワークフローとの関係:
#   - sync-catalog.yml (毎時) : 新着のみ
#   - sync-catalog-full.yml (月1)  : 全期間を 1 ジョブで直列実行 (重いのでブートストラップ向きではない)
#   - sync-catalog-by-year.yml (本ファイル) : 全期間を年単位 matrix で並列、ブートストラップ専用
#
# トリガー:
#   - workflow_dispatch のみ (定期実行はしない)
#
# 並列度:
#   - max-parallel: 4 (DMM ItemList API への同時呼び出しを抑える)
#
# 後続処理:
#   - 完了後に post-bootstrap.yml を手動 dispatch すること
#     (resolve_sample_urls で sample_movie_url を埋め、sync_actress_profiles でプロフィール取得)
#
# 必要な Secrets:
#   - DMM_API_ID, DMM_AFFILIATE_ID, DMM_LINK_AFFILIATE_ID, DATABASE_URL

on:
  workflow_dispatch:
    inputs:
      start_year:
        description: "開始年 (YYYY)"
        required: false
        default: "2000"
      end_year:
        description: "終了年 (YYYY、含む)"
        required: false
        default: "2026"
      floors:
        description: "対象フロア (カンマ区切り)"
        required: false
        default: "videoa,videoc"
      dry_run:
        description: "DB に書かずに動作確認だけ行う"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  # 同時に二重起動しないよう排他制御
  group: sync-catalog-by-year-prod
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────────────────────
  # 1. 年リストを生成する (start_year..end_year)
  # ────────────────────────────────────────────────────────────
  build-matrix:
    name: Build year matrix
    runs-on: ubuntu-latest
    outputs:
      years: ${{ steps.gen.outputs.years }}
    steps:
      - id: gen
        env:
          START_YEAR: ${{ github.event.inputs.start_year || '2000' }}
          END_YEAR: ${{ github.event.inputs.end_year || '2026' }}
        run: |
          python3 - <<'PY'
          import json, os
          s = int(os.environ["START_YEAR"])
          e = int(os.environ["END_YEAR"])
          years = list(range(s, e + 1))
          print(f"years: {years}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"years={json.dumps(years)}\n")
          PY

  # ────────────────────────────────────────────────────────────
  # 2. 年ごとに sync_catalog を並列実行
  # ────────────────────────────────────────────────────────────
  sync-year:
    name: Sync ${{ matrix.year }}
    needs: build-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 120

    strategy:
      fail-fast: false
      # DMM ItemList API への同時負荷を抑えるため 4 並列に制限
      max-parallel: 4
      matrix:
        year: ${{ fromJSON(needs.build-matrix.outputs.years) }}

    defaults:
      run:
        working-directory: apps/jobs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ../api
          pip install -e .

      - name: Run sync_catalog for year ${{ matrix.year }}
        env:
          DMM_API_ID: ${{ secrets.DMM_API_ID }}
          DMM_AFFILIATE_ID: ${{ secrets.DMM_AFFILIATE_ID }}
          DMM_LINK_AFFILIATE_ID: ${{ secrets.DMM_LINK_AFFILIATE_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FLOORS_INPUT: ${{ github.event.inputs.floors || 'videoa,videoc' }}
          DRY_RUN_INPUT: ${{ github.event.inputs.dry_run || 'false' }}
          YEAR: ${{ matrix.year }}
        run: |
          START_DATE="${YEAR}-01-01"
          END_DATE="${YEAR}-12-31"
          ARGS="--mode full --start-date ${START_DATE} --end-date ${END_DATE} --floors ${FLOORS_INPUT}"
          if [ "${DRY_RUN_INPUT}" = "true" ]; then
            ARGS="${ARGS} --dry-run"
          fi
          echo "Running: python -m src.sync_catalog ${ARGS}"
          python -m src.sync_catalog ${ARGS}

  # ────────────────────────────────────────────────────────────
  # 3. サマリ (全 sync-year ジョブ完了後)
  # ────────────────────────────────────────────────────────────
  summary:
    name: Bootstrap summary
    needs: sync-year
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Report
        run: |
          echo "## Bootstrap by year complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Next step: run **post-bootstrap.yml** to resolve sample_movie_url and sync actress profiles." >> "$GITHUB_STEP_SUMMARY"
