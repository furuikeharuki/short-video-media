# ============================================================================
# infra/xserver/docker-compose.yml
# ----------------------------------------------------------------------------
# Xserver VPS 上で api / resolver / jobs-worker / postgres / Caddy を
# 起動するための Compose ファイル。Vercel (web) は外部にあるため対象外。
#
# resolver (DMM MP4 URL 抽出 / Playwright) は以前 apps/resolver として独立
# サービスだったが、apps/api パッケージへ統合済み (app.resolver)。本 compose
# 内で apps/api/Dockerfile.resolver からビルドする resolver サービスとして
# 起動する。コードは api と同じパッケージを共有し、resolver サービスのみ
# Playwright + Chromium を内包する。
# api → resolver は同 docker network 内の http://resolver:8080 で叩く。
#
# 起動:
#   cd infra/xserver
#   cp .env.example .env  # 値を埋める
#   docker compose pull   # (任意) ベースイメージ更新
#   docker compose build
#   docker compose up -d
#
# ログ:
#   docker compose logs -f api
#   docker compose logs -f jobs-worker
#
# 停止:
#   docker compose down            # コンテナ停止
#   docker compose down -v         # ボリュームごと削除 (DB消える、要バックアップ)
# ============================================================================
name: short-video-media-xserver

# Compose ファイル形式は v2 以降 (Docker Engine 25+) 想定。
# version: ... フィールドは削除済み。

services:
  # --------------------------------------------------------------------------
  # PostgreSQL 16
  # --------------------------------------------------------------------------
  # 同一 docker network 内で 'db' という名前で解決される。
  # 外部公開はしない (ports を開けない)。バックアップは backup-postgres.sh で実施。
  db:
    # Railway Postgres が 18.3 で稼働しているため、pg_dump/restore のバージョン
    # 整合上 VPS 側も Postgres 18 系に揃える。
    # 既に 16 系で空の volume を作っていた場合は `docker compose down -v` で
    # ボリュームを削除してから再作成すること (PGDATA フォーマット非互換)。
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # データ消失リスクを下げるため synchronous_commit はデフォルト (on) のまま。
      # tuning は postgresql.conf を別途マウントすること。
      TZ: Asia/Tokyo
    volumes:
      # Postgres 18 公式イメージは VOLUME 宣言が /var/lib/postgresql に変更され、
      # PGDATA は /var/lib/postgresql/<major>/docker (v18 では /var/lib/postgresql/18/docker)
      # が既定。/var/lib/postgresql/data に mount すると 18 では
      # "PGDATA directory ... is not the expected ... unused mount/volume" 系の
      # エラーで再起動ループになる。
      # → mount 先は /var/lib/postgresql 一本に揃え、PGDATA はイメージ既定値に任せる。
      # 17 以前を使う場合はこの mount 先では永続化されないので、その時は
      # PGDATA を明示する必要がある (本リポジトリは 18 系固定なので不要)。
      - postgres_data:/var/lib/postgresql
      # 初回起動用 init スクリプトが必要ならここに追加:
      # - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # メモリリミット (Xserver VPS の最小プランでも安定するように)。
    # 必要に応じて調整。
    deploy:
      resources:
        limits:
          memory: 1024M

  # --------------------------------------------------------------------------
  # API (FastAPI)
  # --------------------------------------------------------------------------
  api:
    build:
      # apps/api/Dockerfile は `COPY pyproject.toml .` 等を context ルート
      # 直下から取る前提で書かれているため、build context は apps/api を指す。
      # (worker 側は逆に `COPY apps/api /app/apps/api` するため context=repo root が必須。
      # 両者で context が違う点はコメントで明示しておく)
      context: ../../apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # docker network 内では db サービスがそのまま名前解決される。
      # localhost と書かないこと (production チェックに引っかかる)。
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      APP_ENV: production
      DEPLOY_TARGET: xserver
      PORT: "8000"
      TZ: Asia/Tokyo
      # resolver は同 compose network 内の `resolver` サービスを指す。
      # .env の RESOLVER_BASE_URL より優先される (env_file → environment の順で
      # environment の方が後勝ちのため)。.env では旧設定が残っていても上書きされる。
      RESOLVER_BASE_URL: ${RESOLVER_BASE_URL:-http://resolver:8080}
    # /healthz が無ければ簡易的に / を叩く。後で /healthz を実装してもよい。
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/', timeout=3).status < 500 else sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    # api 自身は外部に直接公開せず、Caddy 経由でのみ受ける。
    # デバッグで直接叩きたい時は ports: - "127.0.0.1:8000:8000" を一時的に有効化。
    expose:
      - "8000"
    deploy:
      resources:
        limits:
          memory: 512M

  # --------------------------------------------------------------------------
  # Resolver (Playwright Chromium で DMM litevideo iframe から MP4 URL 抽出)
  # --------------------------------------------------------------------------
  # 以前は apps/resolver として独立した FastAPI サービスだったが、
  # apps/api パッケージ (app.resolver) へ統合済み。本サービスは
  # apps/api/Dockerfile.resolver (mcr.microsoft.com/playwright/python ベース,
  # ~2GB) からビルドされ、resolver でのみ Playwright + Chromium を載せる。
  # api コンテナは引き続き slim Python image (~150MB) のまま。
  #
  # メモリ上限: Xserver VPS 2GB プランで Chromium + concurrency=2 を捌くため
  # 768M を確保。RESOLVER_CONCURRENCY を上げる場合は要見直し。
  #
  # 外部公開はしない (expose のみ)。api → resolver は同 network 内の
  # http://resolver:8080 で到達する。
  resolver:
    build:
      # 通常 api と同じ apps/api コードを使うため、context は apps/api。
      # Dockerfile.resolver が `COPY pyproject.toml` / `COPY app` を行う。
      context: ../../apps/api
      dockerfile: Dockerfile.resolver
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: Asia/Tokyo
      # 同時実行 (Playwright pages). Xserver 2GB なら 2 推奨。
      RESOLVER_CONCURRENCY: ${RESOLVER_CONCURRENCY:-2}
      RESOLVER_NAV_TIMEOUT_MS: ${RESOLVER_NAV_TIMEOUT_MS:-15000}
      RESOLVER_WAIT_VIDEO_TIMEOUT_MS: ${RESOLVER_WAIT_VIDEO_TIMEOUT_MS:-8000}
      RESOLVER_LOG_LEVEL: ${RESOLVER_LOG_LEVEL:-INFO}
    expose:
      - "8080"
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).status < 500 else sys.exit(1)"
      interval: 30s
      timeout: 5s
      retries: 5
      # Chromium 起動に時間がかかるため start_period は長めに。
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 768M

  # --------------------------------------------------------------------------
  # jobs worker (APScheduler 常駐)
  # --------------------------------------------------------------------------
  # Railway の jobs-worker サービスを Xserver に持ってきたもの。
  # cron は内部の APScheduler に任せる (GitHub Actions cron は不要)。
  jobs-worker:
    build:
      context: ../..
      dockerfile: apps/jobs/Dockerfile.worker
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      APP_ENV: production
      DEPLOY_TARGET: xserver
      TZ: Asia/Tokyo
      # resolver は同 compose network 内の resolver サービスを指す。
      RESOLVER_BASE_URL: ${RESOLVER_BASE_URL:-http://resolver:8080}
      # 起動直後の bootstrap は誤発火を避けるためデフォルト false。
      # 初回データ取り込みが必要な時だけ .env で true にすること。
      SCHEDULER_BOOTSTRAP: ${SCHEDULER_BOOTSTRAP:-false}
      SCHEDULER_RUN_ON_START: ${SCHEDULER_RUN_ON_START:-false}
    deploy:
      resources:
        limits:
          memory: 768M

  # --------------------------------------------------------------------------
  # Caddy (reverse proxy + 自動 Let's Encrypt)
  # --------------------------------------------------------------------------
  # 旧 apps/resolver の Caddy が VPS 上に別途稼働している場合は、本サービスを
  # 起動せず Caddyfile を旧側に統合するか、別ポート (8443) で待ち受けること。
  # Compose 内には常に置いておき、用途に応じて profiles で起動制御する。
  # resolver サービスは外部公開しないため、Caddy のリバプロ対象は api のみ。
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles: ["proxy"]
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      API_DOMAIN: ${API_DOMAIN:-api.example.com}

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
