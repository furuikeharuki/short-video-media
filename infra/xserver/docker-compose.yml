# ============================================================================
# infra/xserver/docker-compose.yml
# ----------------------------------------------------------------------------
# Xserver VPS 上で api / postgres / Caddy を起動するための
# Compose ファイル。Vercel (web) は外部にあるため対象外。
#
# DMM サンプル動画 MP4 URL 抽出はかつて Playwright 製の resolver コンテナで
# 行っていたが、DMM html5_player ページの `var args = {...}` から直接
# 取り出せることが分かったため、apps/api 内 (httpx) で in-process に解決
# する方式に切り替え、resolver コンテナは廃止した。
#
# 起動:
#   cd infra/xserver
#   cp .env.example .env  # 値を埋める
#   docker compose pull   # (任意) ベースイメージ更新
#   docker compose build
#   docker compose up -d
#
# ログ:
#   docker compose logs -f api
#
# jobs は常駐コンテナを廃止し GitHub Actions ハイブリッド構成に移行済み。
# 詳細はファイル下部の `jobs` サービス上のコメントを参照。
#
# 停止:
#   docker compose down            # コンテナ停止
#   docker compose down -v         # ボリュームごと削除 (DB消える、要バックアップ)
# ============================================================================
name: short-video-media-xserver

# Compose ファイル形式は v2 以降 (Docker Engine 25+) 想定。
# version: ... フィールドは削除済み。

services:
  # --------------------------------------------------------------------------
  # PostgreSQL 16
  # --------------------------------------------------------------------------
  # 同一 docker network 内で 'db' という名前で解決される。
  # 外部公開はしない (ports を開けない)。バックアップは backup-postgres.sh で実施。
  db:
    # Railway Postgres が 18.3 で稼働しているため、pg_dump/restore のバージョン
    # 整合上 VPS 側も Postgres 18 系に揃える。
    # 既に 16 系で空の volume を作っていた場合は `docker compose down -v` で
    # ボリュームを削除してから再作成すること (PGDATA フォーマット非互換)。
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # データ消失リスクを下げるため synchronous_commit はデフォルト (on) のまま。
      # tuning は postgresql.conf を別途マウントすること。
      TZ: Asia/Tokyo
    volumes:
      # Postgres 18 公式イメージは VOLUME 宣言が /var/lib/postgresql に変更され、
      # PGDATA は /var/lib/postgresql/<major>/docker (v18 では /var/lib/postgresql/18/docker)
      # が既定。/var/lib/postgresql/data に mount すると 18 では
      # "PGDATA directory ... is not the expected ... unused mount/volume" 系の
      # エラーで再起動ループになる。
      # → mount 先は /var/lib/postgresql 一本に揃え、PGDATA はイメージ既定値に任せる。
      # 17 以前を使う場合はこの mount 先では永続化されないので、その時は
      # PGDATA を明示する必要がある (本リポジトリは 18 系固定なので不要)。
      - postgres_data:/var/lib/postgresql
      # 初回起動用 init スクリプトが必要ならここに追加:
      # - ./initdb:/docker-entrypoint-initdb.d:ro
    # SSH トンネル経由で GitHub Actions から bootstrap (sync_catalog full)
    # を走らせるため、ホスト OS の loopback (127.0.0.1) にのみ bind する。
    # 0.0.0.0 にはしないので外部ネットワークからは見えない。
    # incremental ジョブを VPS 上で走らせる分には引き続き docker network の
    # `db` 名前解決を使うので、この ports は bootstrap (Actions runner) 用だけの途。
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # メモリリミット (Xserver VPS の最小プランでも安定するように)。
    # 必要に応じて調整。
    deploy:
      resources:
        limits:
          memory: 1024M

  # --------------------------------------------------------------------------
  # API (FastAPI)
  # --------------------------------------------------------------------------
  api:
    build:
      # apps/api/Dockerfile は `COPY pyproject.toml .` 等を context ルート
      # 直下から取る前提で書かれているため、build context は apps/api を指す。
      # (worker 側は逆に `COPY apps/api /app/apps/api` するため context=repo root が必須。
      # 両者で context が違う点はコメントで明示しておく)
      context: ../../apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # docker network 内では db サービスがそのまま名前解決される。
      # localhost と書かないこと (production チェックに引っかかる)。
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      APP_ENV: production
      DEPLOY_TARGET: xserver
      PORT: "8000"
      TZ: Asia/Tokyo
    # ヘルスチェックは /api/v1/health (200 を返す) を叩く。
    # 旧設定では `/` を叩いていたが、FastAPI 側にルートエンドポイントが
    # なく 404 が返るため urllib.request.urlopen が HTTPError を送出し、
    # 必ず unhealthy になる問題があった (api が正常起動していても
    # deploy-xserver.sh の healthcheck 待ちでタイムアウトする)。
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3).status == 200 else sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    # api 自身は外部に直接公開せず、Caddy 経由でのみ受ける。
    # デバッグで直接叩きたい時は ports: - "127.0.0.1:8000:8000" を一時的に有効化。
    expose:
      - "8000"
    deploy:
      resources:
        limits:
          memory: 512M

  # --------------------------------------------------------------------------
  # jobs-worker (APScheduler 常駐) は廃止された
  # --------------------------------------------------------------------------
  # 以前はここで APScheduler 常駐コンテナを走らせ、sync_catalog を 1日 7回、
  # sync_actress_profiles を 1日 1回、そして bootstrap を SCHEDULER_BOOTSTRAP=true の時に
  # 実行していたが、以下の理由で GitHub Actions に移行した:
  #
  #   1. bootstrap を年並列で走らせるとこの VPS (RAM 1.9GB) では OOM する
  #   2. 常駐コンテナで RAM 700MB を 24h 消費するのがもったいない
  #   3. スケジュール管理を GitHub Actions UI に一元化したい (ログもそちらの方が見やすい)
  #
  # 現在の実行体制:
  #   - incremental sync_catalog (日 3 回): .github/workflows/jobs-sync-catalog.yml
  #       → Actions から SSH して VPS 上で docker compose run --rm で 1 発実行 (DB はローカル socket)
  #   - incremental sync_actress_profiles (日 1 回): .github/workflows/jobs-sync-actress.yml
  #       → 同上
  #   - sync_video_urls (月 1 回): .github/workflows/jobs-sync-video-urls.yml
  #       → 同上。サンプル動画 MP4 URL (低/高) を DB に貼り直す。
  #   - bootstrap (手動 dispatch): .github/workflows/jobs-bootstrap.yml
  #       → Actions runner (RAM 7GB) で matrix 年並列 + SSH トンネルで DB に接続
  #
  # ジョブを手動で走らせたい場合 (VPS で SSH ログイン中):
  #   docker compose -f infra/xserver/docker-compose.yml run --rm jobs python -m src.sync_catalog --mode incremental
  #   docker compose -f infra/xserver/docker-compose.yml run --rm jobs python -m src.sync_actress_profiles --only-missing
  #   docker compose -f infra/xserver/docker-compose.yml run --rm jobs python -m src.sync_video_urls --force
  # --------------------------------------------------------------------------
  jobs:
    # 一回実行用の CLI イメージ。 デフォルト profile には含めないので
    # 「docker compose up」だけでは起動しない。Actions から明示的に
    # 「docker compose run --rm jobs ...」と呼ぶことを想定。
    # restartもなし、コマンドが終わるとそのまま退場する。
    profiles: ["cli"]
    build:
      context: ../..
      dockerfile: apps/jobs/Dockerfile.sync
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      APP_ENV: production
      DEPLOY_TARGET: xserver
      TZ: Asia/Tokyo
    # メモリ上限は scheduler 時代 (768M) より低めに制限して OOM リスクを下げる。
    # incremental は 1 ジョブ ~500MB で収まるはず (bootstrap はここで走らさない)。
    deploy:
      resources:
        limits:
          memory: 768M

  # --------------------------------------------------------------------------
  # Caddy (reverse proxy + 自動 Let's Encrypt)
  # --------------------------------------------------------------------------
  # Compose 内には常に置いておき、用途に応じて profiles で起動制御する。
  # リバプロ対象は api のみ。
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles: ["proxy"]
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      API_DOMAIN: ${API_DOMAIN:-api.example.com}

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
